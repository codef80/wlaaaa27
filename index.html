<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>محفظة الولاء</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#241812" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     نظام الألوان مبني بالكامل على هوية الكافيه:
     applyTheme() يضبط --primary / --secondary / --bg / --btn
     وكل ما تحته مشتق منها تلقائيًا عبر color-mix
     ============================================================ */
  :root{
    --primary:#6F4E37; --secondary:#C8A97E; --bg:#241812; --btn:#C8A97E;

    /* مشتقات تلقائية من هوية العميل */
    --ink:      color-mix(in srgb, var(--secondary) 14%, #F7F2EA);
    --muted:    color-mix(in srgb, var(--secondary) 34%, #9c8f83);
    --card:     color-mix(in srgb, var(--bg) 86%, var(--secondary) 14%);
    --card-hi:  color-mix(in srgb, var(--bg) 72%, var(--secondary) 28%);
    --line:     color-mix(in srgb, var(--secondary) 22%, transparent);
    --line-hi:  color-mix(in srgb, var(--secondary) 46%, transparent);
    --glow:     color-mix(in srgb, var(--secondary) 55%, transparent);
    --gold-1:   color-mix(in srgb, var(--secondary) 82%, #fff);
    --gold-2:   color-mix(in srgb, var(--secondary) 88%, var(--primary));
    --gold-3:   color-mix(in srgb, var(--secondary) 60%, var(--primary));
    --deep:     color-mix(in srgb, var(--bg) 78%, #000);
    --ok:#7FB77E;
    --r-lg:30px; --r-md:20px; --r-sm:14px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    margin:0;color:var(--ink);
    font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    font-weight:400;letter-spacing:.1px;
    min-height:100dvh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    background:var(--bg);
    overflow-x:hidden;
  }
  /* خلفية حيّة هادئة من لوني الهوية */
  body::before{content:"";position:fixed;inset:-20%;z-index:-2;pointer-events:none;
    background:
      radial-gradient(48% 38% at 82% -4%, color-mix(in srgb,var(--secondary) 22%,transparent), transparent 70%),
      radial-gradient(52% 44% at -8% 104%, color-mix(in srgb,var(--primary) 30%,transparent), transparent 70%),
      var(--bg);
  }
  /* نسيج «جيوشيه» محفور — بصمة الصفحة */
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.05;
    background:
      repeating-conic-gradient(from 0deg at 50% -20%, var(--secondary) 0deg .4deg, transparent .4deg 6deg);
  }

  h1,h2,.display{font-family:"Reem Kufi","IBM Plex Sans Arabic",sans-serif;font-weight:600;letter-spacing:.4px}

  .wrap{width:min(540px,calc(100% - 28px));margin:0 auto;padding:20px 0 56px}

  /* ---------- شاشة التحميل ---------- */
  .loader{display:grid;place-items:center;gap:18px;padding:34vh 0;color:var(--muted);text-align:center}
  .loader .brew{width:54px;height:54px;border-radius:50%;
    border:2.5px solid var(--line);border-top-color:var(--secondary);
    animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============ 1) بطاقة العضوية المحفورة (الهيرو) ============ */
  .hero{perspective:1200px;margin-bottom:26px}
  .member-card{
    position:relative;border-radius:var(--r-lg);padding:26px 24px 24px;
    min-height:220px;overflow:hidden;transform-style:preserve-3d;
    background:
      radial-gradient(120% 90% at 85% -10%, color-mix(in srgb,var(--gold-1) 26%,transparent), transparent 55%),
      linear-gradient(150deg,
        color-mix(in srgb,var(--primary) 88%, #000) 0%,
        color-mix(in srgb,var(--primary) 68%, var(--secondary)) 48%,
        color-mix(in srgb,var(--primary) 90%, #000) 100%);
    border:1px solid var(--line-hi);
    box-shadow:
      0 30px 70px -28px color-mix(in srgb,var(--deep) 90%, transparent),
      0 8px 24px -12px color-mix(in srgb,var(--glow) 60%, transparent),
      inset 0 1px 0 color-mix(in srgb,#fff 30%, transparent);
    transition:transform .25s ease;
  }
  /* نقشة حفر دائرية داخل البطاقة */
  .member-card::before{content:"";position:absolute;inset:0;opacity:.14;pointer-events:none;
    background:
      repeating-radial-gradient(circle at 110% -30%, transparent 0 9px, color-mix(in srgb,var(--gold-1) 60%,transparent) 9px 9.8px);
  }
  /* لمعة تمر على البطاقة */
  .member-card::after{content:"";position:absolute;inset:-40%;pointer-events:none;
    background:linear-gradient(115deg, transparent 42%, color-mix(in srgb,#fff 32%,transparent) 50%, transparent 58%);
    transform:translateX(-160%) rotate(0.001deg);
    animation:sheen 5.5s ease-in-out 1.2s infinite;
  }
  @keyframes sheen{0%{transform:translateX(-160%)}42%,100%{transform:translateX(160%)}}

  .mc-top{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .mc-brand{display:flex;align-items:center;gap:12px}
  .mc-logo{width:52px;height:52px;border-radius:16px;overflow:hidden;flex:0 0 auto;
    display:grid;place-items:center;font-size:24px;
    background:color-mix(in srgb,#fff 14%,transparent);
    border:1px solid color-mix(in srgb,#fff 26%,transparent);
    box-shadow:inset 0 1px 0 color-mix(in srgb,#fff 30%,transparent)}
  .mc-logo img{width:100%;height:100%;object-fit:cover}
  .mc-name{margin:0;font-size:18px;color:#fff}
  .mc-tag{margin:2px 0 0;font-size:11.5px;letter-spacing:2.5px;font-weight:500;
    color:color-mix(in srgb,var(--gold-1) 80%, #fff);text-transform:uppercase}
  /* ختم عضوية دائري يدور ببطء */
  .mc-seal{position:relative;width:58px;height:58px;flex:0 0 auto}
  .mc-seal svg{width:100%;height:100%;animation:sealSpin 26s linear infinite}
  .mc-seal .seal-core{position:absolute;inset:14px;border-radius:50%;display:grid;place-items:center;
    font-size:17px;background:color-mix(in srgb,#fff 12%,transparent);
    border:1px solid color-mix(in srgb,#fff 30%,transparent)}
  @keyframes sealSpin{to{transform:rotate(360deg)}}

  .mc-body{position:relative;z-index:1;margin-top:26px}
  .mc-hello{margin:0;font-size:13px;color:color-mix(in srgb,#fff 72%,var(--secondary))}
  .mc-member{margin:4px 0 0;font-size:30px;line-height:1.25;color:#fff;
    text-shadow:0 2px 14px color-mix(in srgb,var(--deep) 60%,transparent)}
  .mc-foot{position:relative;z-index:1;margin-top:20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .mc-chip{width:40px;height:30px;border-radius:8px;
    background:linear-gradient(135deg,var(--gold-1),var(--gold-3));
    box-shadow:inset 0 0 0 1px color-mix(in srgb,#000 25%,transparent);position:relative}
  .mc-chip::before{content:"";position:absolute;inset:7px 6px;border:1px solid color-mix(in srgb,#000 30%,transparent);border-radius:4px}
  .install-btn{appearance:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;
    color:#fff;padding:10px 16px;border-radius:999px;
    background:color-mix(in srgb,#fff 12%,transparent);
    border:1px solid color-mix(in srgb,#fff 30%,transparent);
    backdrop-filter:blur(6px);transition:.2s}
  .install-btn:active{transform:scale(.96)}

  /* ============ الأقسام العامة ============ */
  .card{position:relative;background:linear-gradient(180deg,var(--card-hi),var(--card));
    border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;margin-bottom:20px;
    box-shadow:0 24px 50px -30px var(--deep), inset 0 1px 0 color-mix(in srgb,#fff 7%,transparent)}
  .eyebrow{display:flex;align-items:center;gap:10px;margin:0 0 14px;
    font-size:11.5px;letter-spacing:3px;font-weight:600;color:var(--muted)}
  .eyebrow::after{content:"";height:1px;flex:1;
    background:linear-gradient(to left,var(--line-hi),transparent)}
  .card h2{font-size:19px;margin:0 0 4px;color:var(--ink)}
  .muted{color:var(--muted);line-height:1.9;margin:0;font-size:13.5px}

  /* دخول متدرّج للأقسام */
  .reveal{opacity:0;transform:translateY(16px);animation:rise .7s cubic-bezier(.2,.8,.2,1) forwards}
  .reveal:nth-child(2){animation-delay:.08s}
  .reveal:nth-child(3){animation-delay:.16s}
  .reveal:nth-child(4){animation-delay:.24s}
  .reveal:nth-child(5){animation-delay:.32s}
  @keyframes rise{to{opacity:1;transform:none}}

  /* ============ 2) الرصيد + الأختام ============ */
  .bal-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px}
  .bal-num{font-family:"Reem Kufi",sans-serif;font-size:60px;line-height:.85;font-weight:700;
    background:linear-gradient(160deg,var(--gold-1),var(--gold-3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 14px var(--glow))}
  .bal-of{font-size:22px;color:var(--muted);font-weight:500}
  .bal-side{text-align:left}
  .bal-side .lbl{font-size:12px;color:var(--muted)}
  .bal-side strong{display:block;font-family:"Reem Kufi",sans-serif;font-size:26px;margin-top:2px}

  .track{height:8px;border-radius:999px;overflow:hidden;position:relative;
    background:color-mix(in srgb,var(--deep) 70%,transparent);
    box-shadow:inset 0 1px 3px color-mix(in srgb,#000 40%,transparent)}
  .track span{display:block;height:100%;border-radius:999px;position:relative;
    background:linear-gradient(90deg,var(--gold-3),var(--gold-1));
    transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .track span::after{content:"";position:absolute;inset:0;border-radius:999px;
    background:linear-gradient(90deg,transparent,color-mix(in srgb,#fff 45%,transparent),transparent);
    background-size:200% 100%;animation:shimmer 2.4s linear infinite}
  @keyframes shimmer{to{background-position:-200% 0}}

  /* أختام الشمع */
  .stamps{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
  .stamp{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:17px;
    color:color-mix(in srgb,var(--secondary) 50%,transparent);
    border:1.5px dashed var(--line-hi);
    background:color-mix(in srgb,var(--deep) 40%,transparent);
    transition:.3s}
  .stamp.on{color:var(--deep);border:none;
    background:radial-gradient(circle at 34% 28%, var(--gold-1), var(--gold-2) 58%, var(--gold-3));
    box-shadow:0 6px 14px -6px var(--glow), inset 0 2px 3px color-mix(in srgb,#fff 50%,transparent),
      inset 0 -3px 5px color-mix(in srgb,#000 28%,transparent);
    animation:stampIn .45s cubic-bezier(.2,1.4,.4,1) backwards}
  .stamp.on:nth-child(odd){rotate:-4deg}
  .stamp.on:nth-child(3n){rotate:5deg}
  @keyframes stampIn{0%{transform:scale(1.9);opacity:0}100%{transform:scale(1);opacity:1}}
  .remain{font-size:13.5px;margin:16px 0 0;font-weight:600;
    color:color-mix(in srgb,var(--gold-1) 85%,#fff)}

  /* ============ 3) الروليت الأسطوري ============ */
  .roulette{text-align:center;overflow:hidden;
    background:
      radial-gradient(90% 60% at 50% 0%, color-mix(in srgb,var(--secondary) 12%,transparent), transparent 60%),
      linear-gradient(180deg,var(--card-hi),var(--card))}
  .wheel-shell{width:min(340px,86vw);height:min(340px,86vw);margin:22px auto 8px;position:relative;
    filter:drop-shadow(0 30px 44px color-mix(in srgb,var(--deep) 85%,transparent))}
  /* إطار برونزي بمسامير */
  .bezel{position:absolute;inset:-14px;border-radius:50%;z-index:1;
    background:
      radial-gradient(circle at 32% 24%, color-mix(in srgb,#fff 55%,transparent), transparent 18%),
      conic-gradient(var(--gold-2),var(--gold-1),var(--gold-3),var(--gold-1),var(--gold-2));
    box-shadow:inset 0 0 0 2px color-mix(in srgb,#fff 30%,transparent),
      inset 0 0 26px color-mix(in srgb,#000 35%,transparent),
      0 20px 46px color-mix(in srgb,var(--deep) 80%,transparent)}
  .bezel::before{content:"";position:absolute;inset:9px;border-radius:50%;
    background:repeating-conic-gradient(from 0deg,
      color-mix(in srgb,#fff 40%,transparent) 0deg 1deg, transparent 1deg 15deg)}
  .wheel-lamps{position:absolute;inset:-14px;border-radius:50%;z-index:6;pointer-events:none}
  .wheel-lamp{position:absolute;top:50%;left:50%;width:8px;height:8px;margin:-4px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--gold-1) 60%, var(--gold-3));
    box-shadow:0 0 8px var(--glow);transition:opacity .15s}
  .wheel.is-spinning ~ .wheel-lamps .wheel-lamp:nth-child(odd){animation:lamp .38s linear infinite}
  .wheel.is-spinning ~ .wheel-lamps .wheel-lamp:nth-child(even){animation:lamp .38s linear infinite reverse}
  @keyframes lamp{0%,100%{opacity:1}50%{opacity:.25}}

  .wheel-pointer{position:absolute;top:-24px;left:50%;transform-origin:50% 20%;
    transform:translateX(-50%);width:46px;height:60px;z-index:8;
    filter:drop-shadow(0 8px 12px color-mix(in srgb,#000 45%,transparent));transition:transform .07s}
  .wheel-pointer.kick{transform:translateX(-50%) rotate(-14deg)}
  .wheel-pointer::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 34% 28%, #fff, var(--gold-1) 55%, var(--gold-3));
    border:2px solid color-mix(in srgb,#fff 80%,transparent)}
  .wheel-pointer::after{content:"";position:absolute;top:26px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;
    border-top:30px solid var(--gold-1)}

  .wheel{position:relative;z-index:2;width:100%;height:100%;border-radius:50%;overflow:hidden;
    border:10px solid color-mix(in srgb,var(--deep) 55%, var(--primary));
    background:conic-gradient(var(--primary),var(--secondary),var(--primary));
    transition:transform 4.6s cubic-bezier(.08,.84,.13,1);
    box-shadow:inset 0 0 0 2px color-mix(in srgb,#fff 25%,transparent),
      inset 0 0 44px color-mix(in srgb,#000 30%,transparent)}
  .wheel::before{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:2;
    background:radial-gradient(circle at 33% 25%, color-mix(in srgb,#fff 28%,transparent), transparent 24%),
      radial-gradient(circle at 70% 78%, color-mix(in srgb,#000 22%,transparent), transparent 26%)}
  .wheel-labels{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:3}
  .wheel-label{position:absolute;top:50%;left:50%;width:92px;min-height:32px;
    margin-left:-46px;margin-top:-16px;display:grid;place-items:center;text-align:center;
    color:#fff;font-weight:700;font-size:12.5px;line-height:1.3;
    font-family:"IBM Plex Sans Arabic",sans-serif;
    text-shadow:0 2px 8px color-mix(in srgb,#000 60%,transparent);padding:3px 4px}
  .wheel-center{position:absolute;z-index:5;width:86px;height:86px;border-radius:50%;top:50%;left:50%;
    transform:translate(-50%,-50%);display:grid;place-items:center;font-size:30px;overflow:hidden;
    background:radial-gradient(circle at 34% 26%, #fff, color-mix(in srgb,var(--gold-1) 75%,#fff) 46%, var(--gold-2));
    border:5px solid color-mix(in srgb,#fff 85%,transparent);
    box-shadow:0 12px 22px color-mix(in srgb,#000 35%,transparent),
      inset 0 -4px 8px color-mix(in srgb,#000 20%,transparent)}
  .wheel-center img{width:100%;height:100%;object-fit:cover;border-radius:50%}

  .btn{appearance:none;border:0;border-radius:18px;padding:17px 22px;width:100%;
    font-family:"Reem Kufi","IBM Plex Sans Arabic",sans-serif;font-weight:700;font-size:17px;
    cursor:pointer;color:var(--deep);position:relative;overflow:hidden;
    background:linear-gradient(160deg,var(--gold-1),var(--btn) 55%,var(--gold-3));
    box-shadow:0 14px 28px -12px var(--glow), inset 0 1px 0 color-mix(in srgb,#fff 55%,transparent);
    transition:.18s;margin-top:14px}
  .btn::after{content:"";position:absolute;inset:0;
    background:linear-gradient(115deg,transparent 42%,color-mix(in srgb,#fff 40%,transparent) 50%,transparent 58%);
    background-size:250% 100%;animation:shimmer 3.2s linear infinite}
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .btn:disabled::after{display:none}

  .result{display:none;margin-top:16px;border-radius:var(--r-md);padding:16px;
    font-weight:700;line-height:1.9;border:1px solid var(--line)}
  .result.show{display:block;animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}

  /* ستارة الجائزة السينمائية */
  .prize-overlay{position:fixed;inset:0;z-index:80;display:none;place-items:center;text-align:center;
    background:color-mix(in srgb,var(--deep) 88%,transparent);backdrop-filter:blur(10px);padding:24px}
  .prize-overlay.show{display:grid;animation:fadeIn .35s ease}
  @keyframes fadeIn{from{opacity:0}}
  .prize-rays{position:absolute;inset:-40%;pointer-events:none;opacity:.5;
    background:repeating-conic-gradient(from 0deg at 50% 50%,
      color-mix(in srgb,var(--secondary) 30%,transparent) 0deg 6deg, transparent 6deg 18deg);
    animation:sealSpin 30s linear infinite;
    -webkit-mask:radial-gradient(circle at 50% 50%, #000, transparent 62%);
    mask:radial-gradient(circle at 50% 50%, #000, transparent 62%)}
  .prize-inner{position:relative;z-index:1;animation:prizeUp .6s cubic-bezier(.2,1.3,.4,1)}
  @keyframes prizeUp{0%{transform:translateY(30px) scale(.85);opacity:0}100%{transform:none;opacity:1}}
  .prize-kicker{font-size:13px;letter-spacing:4px;color:var(--muted);margin:0 0 12px;font-weight:600}
  .prize-name{font-family:"Reem Kufi",sans-serif;font-size:clamp(30px,9vw,46px);font-weight:700;margin:0;
    background:linear-gradient(160deg,#fff,var(--gold-1) 45%,var(--gold-3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 6px 22px var(--glow))}
  .prize-emoji{font-size:56px;margin-bottom:10px;display:block;animation:float 2.4s ease-in-out infinite}
  @keyframes float{50%{transform:translateY(-8px)}}
  .prize-close{margin-top:26px;width:auto;padding:14px 44px}
  .confetti{position:fixed;top:-12px;z-index:81;width:9px;height:14px;border-radius:2px;pointer-events:none;
    animation:confFall linear forwards}
  @keyframes confFall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}

  /* ============ 4) القوائم ============ */
  .list{display:grid;gap:10px;margin-top:16px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:15px 16px;border-radius:var(--r-md);
    background:color-mix(in srgb,var(--deep) 45%,transparent);
    border:1px solid var(--line);transition:.2s}
  .row:active{border-color:var(--line-hi)}
  .row .t{font-weight:600;font-size:15px}
  .row .m{font-size:12.5px;color:var(--muted);margin-top:4px}
  .pill{font-size:11.5px;font-weight:600;padding:6px 13px;border-radius:999px;white-space:nowrap;
    color:var(--gold-1);border:1px solid var(--line-hi);
    background:color-mix(in srgb,var(--secondary) 12%,transparent)}
  .pill.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 35%,transparent);
    background:color-mix(in srgb,var(--ok) 12%,transparent)}
  .empty{padding:22px 16px;border-radius:var(--r-md);text-align:center;line-height:1.9;
    color:var(--muted);border:1.5px dashed var(--line);font-size:13.5px}

  /* ============ المودال والتوست ============ */
  .modal{display:none;position:fixed;inset:0;background:color-mix(in srgb,#000 55%,transparent);
    z-index:90;padding:18px;place-items:center;backdrop-filter:blur(6px)}
  .modal.show{display:grid}
  .modal-card{width:min(420px,100%);background:linear-gradient(180deg,var(--card-hi),var(--card));
    border:1px solid var(--line-hi);border-radius:var(--r-lg);padding:24px;
    box-shadow:0 30px 70px color-mix(in srgb,#000 50%,transparent);animation:prizeUp .4s ease}
  .modal-card h2{margin:0 0 8px}
  .modal-card ol{line-height:2.1;padding-right:22px;color:var(--muted);font-size:14px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(140%);
    background:var(--deep);color:var(--ink);border:1px solid var(--line-hi);
    padding:13px 20px;border-radius:14px;font-size:13.5px;font-weight:500;
    transition:.3s;z-index:99;max-width:90%;text-align:center;
    box-shadow:0 14px 30px color-mix(in srgb,#000 45%,transparent)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:#8c2f2f;color:#f0b9b9}

  @media (prefers-reduced-motion:reduce){
    .wheel{transition:none}
    .member-card::after,.btn::after,.track span::after,.mc-seal svg,
    .prize-rays,.prize-emoji,.reveal{animation:none}
    .reveal{opacity:1;transform:none}
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="loader" id="loading"><div class="brew"></div><div>…نحضّر بطاقتك</div></div>
    <div id="content" style="display:none"></div>
  </main>

  <!-- ستارة الجائزة -->
  <div class="prize-overlay" id="prizeOverlay">
    <div class="prize-rays"></div>
    <div class="prize-inner">
      <span class="prize-emoji" id="prizeEmoji">🎁</span>
      <p class="prize-kicker" id="prizeKicker">مبروك — ربحت</p>
      <h1 class="prize-name" id="prizeName"></h1>
      <button class="btn prize-close" id="prizeClose">استلمها في مكافآتي</button>
    </div>
  </div>

  <div class="modal" id="installModal">
    <div class="modal-card">
      <h2>إضافة البطاقة للشاشة الرئيسية</h2>
      <div id="installSteps" class="muted"></div>
      <button class="btn" id="closeInstall">تم</button>
    </div>
  </div>

<script type="module">
import { callFn, hashParam, applyTheme, toast } from "./app.js";

const token = hashParam("t");
const $ = (s)=>document.querySelector(s);
let state=null, wheelPrizes=[], currentRotation=0;
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

if(!token){ $("#loading").innerHTML="الرابط غير صالح.<br>اطلب رابطك من الكافيه."; }
else load();

async function load(){
  try{
    state = await callFn("customer-me", { magic_token: token });
    applyTheme(state.cafe);
    render();
  }catch(e){ $("#loading").innerHTML="تعذّر تحميل صفحتك.<br>تأكد من الرابط."; }
}

function fmtDate(s){return new Date(s).toLocaleDateString("ar-SA");}
function fmtDateTime(s){return new Date(s).toLocaleString("ar-SA",{dateStyle:"medium",timeStyle:"short"});}

/* حلقة النص الدائرية في ختم العضوية */
function sealSVG(name){
  const txt = `${name||"كافيه"} • بطاقة الولاء • `;
  return `<svg viewBox="0 0 100 100">
    <defs><path id="cir" d="M50,50 m-38,0 a38,38 0 1,1 76,0 a38,38 0 1,1 -76,0"/></defs>
    <circle cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
    <text font-size="10.5" font-family="Reem Kufi, sans-serif" fill="rgba(255,255,255,.85)" letter-spacing="1.5">
      <textPath href="#cir">${txt}${txt}</textPath>
    </text></svg>`;
}

function render(){
  const c=state, cafe=c.cafe||{};
  const need=c.cups_per_reward||10, bal=c.balance||0;
  const total=(c.visits||[]).reduce((s,v)=>s+(v.cups||0),0);
  const remain=Math.max(0,need-bal);
  const percent=Math.min(100,Math.round((bal/need)*100));

  const stamps=Array.from({length:need},(_,i)=>
    `<div class="stamp ${i<bal?"on":""}" style="animation-delay:${.35+i*.07}s">☕</div>`).join("");

  const rewards=(c.rewards||[]).map(r=>`
    <div class="row">
      <div><div class="t">🎁 ${r.label}</div>
        <div class="m">${r.expires_at?"تنتهي "+fmtDate(r.expires_at):"سارية بدون انتهاء"}</div></div>
      <span class="pill ok">جاهزة للاستلام</span>
    </div>`).join("") || `<div class="empty">مكافآتك ستظهر هنا —<br>كل زيارة تقرّبك خطوة ☕</div>`;

  const visits=(c.visits||[]).slice(0,3).map(v=>`
    <div class="row">
      <div><div class="t">${v.cups} ${v.cups==1?"كوب":"أكواب"}</div>
        <div class="m">${fmtDateTime(v.occurred_at)}</div></div>
      <span class="pill">زيارة</span>
    </div>`).join("") || `<div class="empty">لا زيارات مسجّلة بعد</div>`;

  const canSpin=!!c.pending_spin_visit_id;
  const logo = cafe.logo_url?`<img src="${cafe.logo_url}" alt="">`:"☕";

  $("#content").innerHTML=`
    <section class="hero reveal">
      <div class="member-card" id="memberCard">
        <div class="mc-top">
          <div class="mc-brand">
            <div class="mc-logo">${logo}</div>
            <div>
              <p class="mc-name display">${cafe.name||"كافيه"}</p>
              <p class="mc-tag">LOYALTY MEMBER</p>
            </div>
          </div>
          <div class="mc-seal">${sealSVG(cafe.name)}<div class="seal-core">✦</div></div>
        </div>
        <div class="mc-body">
          <p class="mc-hello">بطاقة عضوية باسم</p>
          <h1 class="mc-member">${c.customer.full_name||"عميلنا العزيز"}</h1>
        </div>
        <div class="mc-foot">
          <div class="mc-chip"></div>
          <button class="install-btn" id="installBtn">＋ إضافة للشاشة الرئيسية</button>
        </div>
      </div>
    </section>

    <section class="card reveal">
      <p class="eyebrow">رصيد الأكواب</p>
      <div class="bal-row">
        <div><span class="bal-num" id="curCups">${bal}</span> <span class="bal-of">/ ${need}</span></div>
        <div class="bal-side"><span class="lbl">إجمالي أكوابك</span><strong>${total}</strong></div>
      </div>
      <div class="track"><span id="progressBar" style="width:${percent}%"></span></div>
      <div class="stamps">${stamps}</div>
      <p class="remain">${remain===0?"🎉 كوبك المجاني بانتظارك!":`باقٍ ${remain} ${remain==1?"كوب واحد":"أكواب"} على كوبك المجاني`}</p>
    </section>

    <section class="card roulette reveal">
      <p class="eyebrow">روليت المكافآت</p>
      <p class="muted" id="rouletteText">
        ${canSpin?"لديك دورة مؤهلة من زيارتك الأخيرة — جرّب حظك.":"دورتك القادمة تُفتح بعد زيارتك المؤهلة القادمة."}</p>
      <div class="wheel-shell">
        <div class="bezel"></div>
        <div class="wheel" id="wheel"><div class="wheel-labels" id="wheelLabels"></div></div>
        <div class="wheel-center">${logo}</div>
        <div class="wheel-lamps" id="wheelLamps"></div>
        <div class="wheel-pointer" id="pointer"></div>
      </div>
      <button class="btn" id="spinBtn" ${canSpin?"":"disabled"}>
        ${canSpin?"أدر العجلة":"غير متاح حاليًا"}</button>
      <div class="result" id="spinResult"></div>
    </section>

    <section class="card reveal">
      <p class="eyebrow">مكافآتي</p>
      <p class="muted">اعرضها للباريستا عند زيارتك.</p>
      <div class="list">${rewards}</div>
    </section>

    <section class="card reveal">
      <p class="eyebrow">آخر الزيارات</p>
      <div class="list">${visits}</div>
    </section>
  `;
  $("#loading").style.display="none";
  $("#content").style.display="block";

  wheelPrizes = (c.roulette_preview||[]).map(p=>p.label);
  drawWheel(wheelPrizes.length?wheelPrizes:["خصم","ترقية","إضافة","كوب مجاني","نقاط","حظ أوفر"]);

  if(canSpin) $("#spinBtn").onclick=doSpin;
  $("#installBtn").onclick=openInstall;
  initTilt();
}

/* ميلان ثلاثي الأبعاد للبطاقة */
function initTilt(){
  if(reduced) return;
  const card=$("#memberCard"); if(!card) return;
  card.addEventListener("pointermove",(e)=>{
    const r=card.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-.5, y=(e.clientY-r.top)/r.height-.5;
    card.style.transform=`rotateY(${x*7}deg) rotateX(${-y*7}deg)`;
  });
  card.addEventListener("pointerleave",()=>{card.style.transform="";});
}

function drawWheel(labels){
  const seg=(labels&&labels.length)?labels:["1","2","3","4","5","6"];
  const n=seg.length;
  /* ألوان القطاعات مشتقة من هوية الكافيه بنسب متدرجة */
  const s=getComputedStyle(document.documentElement);
  const P=s.getPropertyValue("--primary").trim(), S=s.getPropertyValue("--secondary").trim();
  const mixes=[
    `color-mix(in srgb, ${P} 92%, #000)`,
    `color-mix(in srgb, ${S} 88%, #fff)`,
    `color-mix(in srgb, ${P} 72%, ${S})`,
    `color-mix(in srgb, ${S} 70%, ${P})`,
    `color-mix(in srgb, ${P} 88%, #fff)`,
    `color-mix(in srgb, ${S} 82%, #000)`
  ];
  let g="";
  for(let i=0;i<n;i++){
    const a0=(360/n)*i, a1=(360/n)*(i+1);
    g+=`${mixes[i%mixes.length]} ${a0}deg ${a1}deg,`;
  }
  const w=$("#wheel"); if(w) w.style.background=`conic-gradient(${g.slice(0,-1)})`;

  const box=$("#wheelLabels"); if(box){ box.innerHTML="";
    seg.forEach((label,i)=>{
      const mid=(360/n)*i+(360/n)/2;
      const el=document.createElement("div"); el.className="wheel-label";
      el.style.transform=`rotate(${mid}deg) translateY(-100px) rotate(${-mid}deg)`;
      el.textContent=String(label).length<=13?label:String(label).slice(0,12)+"…";
      box.appendChild(el);
    });
  }
  const lamps=$("#wheelLamps"); if(lamps&&!lamps.childElementCount){
    for(let i=0;i<24;i++){ const l=document.createElement("span");
      l.className="wheel-lamp"; l.style.transform=`rotate(${i*15}deg) translateY(-176px)`;
      lamps.appendChild(l); }
  }
}

/* صوت واهتزاز */
let audioCtx=null;
function ensureAudio(){ try{ audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function tick(){
  const p=$("#pointer");
  if(p){ p.classList.add("kick"); setTimeout(()=>p.classList.remove("kick"),70); }
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type="square"; o.frequency.value=880;
  g.gain.setValueAtTime(.04,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.05);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+.05);
}
function fanfare(win){ if(!audioCtx) return;
  const notes=win?[523,659,784,1047]:[440,392];
  notes.forEach((f,i)=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type="triangle"; o.frequency.value=f; const t=audioCtx.currentTime+i*.13;
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.12,t+.03);
    g.gain.exponentialRampToValueAtTime(.0001,t+.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+.32); });
}
function vibrate(p){ if(navigator.vibrate) try{navigator.vibrate(p);}catch(e){} }

/* قصاصات احتفال بألوان الهوية */
function confetti(){
  if(reduced) return;
  const s=getComputedStyle(document.documentElement);
  const colors=[s.getPropertyValue("--secondary"),s.getPropertyValue("--primary"),"#fff",
    s.getPropertyValue("--gold-1")||s.getPropertyValue("--secondary")];
  for(let i=0;i<70;i++){
    const c=document.createElement("i"); c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2.2+Math.random()*2)+"s";
    c.style.animationDelay=(Math.random()*.6)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5200);
  }
}

function showPrize(win,label){
  $("#prizeEmoji").textContent = win?"🎁":"☕";
  $("#prizeKicker").textContent = win?"مبروك — ربحت":"هذه المرة";
  $("#prizeName").textContent = label;
  $("#prizeClose").textContent = win?"استلمها في مكافآتي":"حظ أوفر بالزيارة القادمة";
  $("#prizeOverlay").classList.add("show");
  if(win) confetti();
}
$("#prizeClose").onclick=()=>{ $("#prizeOverlay").classList.remove("show"); load(); };

async function doSpin(){
  ensureAudio();
  const btn=$("#spinBtn"); btn.disabled=true; btn.textContent="…العجلة تدور";
  $("#spinResult").classList.remove("show");
  try{
    const res=await callFn("spin",{ magic_token:token, visit_id:state.pending_spin_visit_id });
    wheelPrizes=(res.wheel||[]).map(w=>w.label);
    drawWheel(wheelPrizes);

    const n=wheelPrizes.length||6;
    const idx=Math.max(0,wheelPrizes.indexOf(res.prize_label));
    const segMid=(360/n)*idx+(360/n)/2;

    const curMod=((currentRotation%360)+360)%360;
    const delta=(360-((curMod+segMid)%360))%360;
    currentRotation += 360*6 + delta;

    const wheel=$("#wheel");
    wheel.classList.add("is-spinning");
    wheel.style.transform=`rotate(${currentRotation}deg)`;

    vibrate([30]);
    let d=90; const tickLoop=()=>{ tick(); d*=1.12; if(d<650) setTimeout(tickLoop,d); };
    tickLoop();

    setTimeout(()=>{
      wheel.classList.remove("is-spinning");
      const win = res.prize_type!=="none";
      const box=$("#spinResult"); box.classList.add("show");
      if(win){ box.style.color="var(--ok)";
        box.style.background="color-mix(in srgb, var(--ok) 12%, transparent)";
        box.style.borderColor="color-mix(in srgb, var(--ok) 30%, transparent)";
        box.textContent=`🎉 مبروك! ربحت: ${res.prize_label}`;
        fanfare(true); vibrate([60,40,60,40,120]); }
      else{ box.style.color="var(--muted)";
        box.style.background="color-mix(in srgb, var(--deep) 45%, transparent)";
        box.style.borderColor="var(--line)";
        box.textContent=`حظ أوفر: ${res.prize_label}`;
        fanfare(false); vibrate([80]); }
      setTimeout(()=>showPrize(win,res.prize_label),650);
    },4700);
  }catch(e){
    if(e.message==="ALREADY_SPUN") toast("سبق اللعب على هذه الزيارة",true);
    else toast("تعذّر اللعب",true);
    btn.disabled=false; btn.textContent="أدر العجلة";
  }
}

/* التثبيت على الشاشة الرئيسية */
let deferred;
window.addEventListener("beforeinstallprompt",(e)=>{e.preventDefault();deferred=e;});
async function openInstall(){
  if(deferred){ deferred.prompt(); await deferred.userChoice; deferred=null; return; }
  const ua=navigator.userAgent, steps=$("#installSteps");
  if(/iphone|ipad|ipod/i.test(ua)) steps.innerHTML="<ol><li>اضغط زر المشاركة في المتصفح.</li><li>اختر: إضافة إلى الشاشة الرئيسية.</li><li>اضغط إضافة.</li></ol>";
  else if(/android/i.test(ua)) steps.innerHTML="<ol><li>اضغط قائمة المتصفح ⋮.</li><li>اختر: إضافة إلى الشاشة الرئيسية.</li><li>اضغط تثبيت أو إضافة.</li></ol>";
  else steps.innerHTML="<ol><li>افتح الصفحة من جوالك.</li><li>استخدم خيار «إضافة للشاشة الرئيسية» من المتصفح.</li></ol>";
  $("#installModal").classList.add("show");
}
$("#closeInstall").onclick=()=>$("#installModal").classList.remove("show");
$("#installModal").onclick=(e)=>{ if(e.target===$("#installModal")) $("#installModal").classList.remove("show"); };

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
